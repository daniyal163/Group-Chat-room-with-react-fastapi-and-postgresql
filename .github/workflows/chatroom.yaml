name: Project CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. CI Job: Check FastAPI Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  # 2. CI Job: Build React Frontend
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Build Frontend
      working-directory: ./reac/front
      run: |
        npm ci
        npm run build

  # 3. CD Job: Trigger Deployment
  deploy:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Render Deployment
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        else
          echo "No deployment hook secret found yet. Skipping deploy step."
        fi
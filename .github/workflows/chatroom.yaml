# 2. CI Job: Build React
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Build
      # This line tells GitHub to look inside your frontend folder!
      working-directory: ./reac  
      run: |
        npm ci
        npm run build